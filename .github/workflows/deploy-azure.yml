name: Deploy to Azure Container Apps

# Builds and deploys the Streamlit savings-analysis app to Azure Container Apps.
# Triggers on push to main. Uses OIDC for keyless Azure auth.

permissions:
  id-token: write
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-source-club
  cancel-in-progress: true

env:
  ACR_REGISTRY: inflexisacr2.azurecr.io
  ACR_IMAGE: source-club
  CONTAINER_APP_NAME: source-club-app
  RESOURCE_GROUP: inflexis-rg
  CONTAINER_APP_ENV: inflexis-env

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Azure Container Registry
        run: |
          TOKEN=$(az acr login --name inflexisacr2 --expose-token \
            --output tsv --query accessToken)
          echo "$TOKEN" | docker login inflexisacr2.azurecr.io \
            --username 00000000-0000-0000-0000-000000000000 \
            --password-stdin

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_IMAGE }}:latest
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_IMAGE }}:${{ github.sha }}

      - name: Deploy to Container Apps
        run: |
          EXISTING=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "name" --output tsv 2>/dev/null || echo "")

          if [ -z "$EXISTING" ]; then
            az containerapp create \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --environment ${{ env.CONTAINER_APP_ENV }} \
              --image ${{ env.ACR_REGISTRY }}/${{ env.ACR_IMAGE }}:latest \
              --registry-server ${{ env.ACR_REGISTRY }} \
              --registry-identity system \
              --target-port 8501 \
              --ingress external \
              --min-replicas 0 \
              --max-replicas 2 \
              --cpu 0.5 \
              --memory 1.0Gi \
              --env-vars \
                ANTHROPIC_API_KEY=secretref:anthropic-api-key
          else
            az containerapp update \
              --name ${{ env.CONTAINER_APP_NAME }} \
              --resource-group ${{ env.RESOURCE_GROUP }} \
              --image ${{ env.ACR_REGISTRY }}/${{ env.ACR_IMAGE }}:${{ github.sha }}
          fi

      - name: Get deployment URL
        run: |
          URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" \
            --output tsv 2>/dev/null || echo "pending")
          echo "Deployed: https://$URL" >> $GITHUB_STEP_SUMMARY
